name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  psalm:
    name: Psalm taint + static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, mbstring, pcre
          coverage: none
          ini-values: error_reporting=E_ALL

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json', 'composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Build single file
        run: php build.php

      - name: Lint build
        run: php -l dist/index.php

      - name: Psalm (source + build)
        run: vendor/bin/psalm --no-cache --output-format=github dist/index.php

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep CE scan
        run: |
          semgrep scan \
            --config auto \
            --config p/owasp-top-ten \
            --config p/cwe-top-25 \
            --config p/php \
            --config .semgrep/pageweave.yml \
            --error \
            src build.php
